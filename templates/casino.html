    <div id="slot" class="bg-black rounded-3xl p-12 text-center text-8xl mb-12 h-48 flex items-center justify-center">🎰</div>
    <button onclick="spin()" class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black py-8 rounded-3xl text-3xl font-bold">SPIN – 44 SKY444</button>
    <script>
        function spin() {

            if (Math.random() > 0.6) {
                alert("🎉 WINNER! +44.44 SKY444 added • 25% sent to charity on-chain");
            } else {
                alert("Better luck next spin! Tip to play again 💸");

        }
