<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stake SKY444 • ShadowChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-[#0a0a2a] text-white p-6">
    <h1 class="text-4xl font-bold mb-8 neon-purple">Stake SKY444 – Earn up to 44.4% APY</h1>
    <div class="bg-[#1a0b3d] rounded-3xl p-8">
        <input id="stakeAmount" type="number" placeholder="Amount to stake" class="w-full bg-black/50 p-6 rounded-3xl text-xl mb-6">
        <button onclick="window.stakingManager.stake(document.getElementById('stakeAmount').value, 90)" class="w-full bg-purple-600 py-6 rounded-3xl text-2xl font-bold">Stake Now (90 days – Sky Cycle Bonus)</button>
    </div>
</body>
</html>
