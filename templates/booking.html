<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Consultation • Innovative IT Resolutions LLC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-[#0a0a2a] text-white p-6">
    <div class="max-w-lg mx-auto bg-white text-black rounded-3xl p-8">
        <h1 class="text-3xl font-bold mb-2">Free IT Consultation</h1>
        <form class="space-y-6">
            <input type="text" placeholder="Name" class="w-full border p-4 rounded-2xl">
            <input type="email" placeholder="Email" class="w-full border p-4 rounded-2xl">
            <input type="tel" placeholder="Phone" class="w-full border p-4 rounded-2xl">
            <textarea placeholder="Message" class="w-full border p-4 rounded-2xl h-32"></textarea>
            <button onclick="alert('✅ Request sent! Skyler will call you at 479-406-8378')" class="w-full bg-blue-600 text-white py-6 rounded-3xl text-xl font-bold">Send Request</button>
        </form>
    </div>
</body>
</html>
