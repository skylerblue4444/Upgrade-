<html>
<body style="background:#111;color:#fff;font-family:Arial">
<h2>SAMS CHAT</h2>

<div id="box"></div>
<input id="msg"/>
<button onclick="send()">Send</button>

<script>
function send(){
  const v = msg.value;
  box.innerHTML += "<div>You: "+v+"</div>";

  fetch("/chat",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({input:v})
  }).then(r=>r.json()).then(d=>{
    box.innerHTML += "<div>AI: "+d.output+"</div>";
  });
}
</script>
</body>
</html>
