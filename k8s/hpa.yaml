apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shadowchat-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shadowchat
  minReplicas: 100
  maxReplicas: 2000
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70